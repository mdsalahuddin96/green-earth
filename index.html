<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!-- Font awesome integration -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Tailwind and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css">

</head>

<body class="bg-[#DCFCE7]">
    <main class="border-2 border-amber-500">
        <h1 class="text-2xl font-bold text-center">Choose Your Trees</h1>
        <section id="container" class="border-2 border-green-600 max-w-11/12 mx-auto my-10 grid grid-cols-12">
            <div id="category-section" class="p-4 col-span-3">
                <h2 class="text-xl font-semibold">Categories</h2>
                <div id="category-btn-section" class="flex flex-col gap-2 mt-4">
                    <button id="all-trees-btn" class="category-btn btn btn-outline active">All Trees</button>
                </div>
            </div>
            <div id="all-plant-section" class="p-4 col-span-6">
                <div id="trees-card-container" class="grid grid-cols-3 gap-3">
                    <!-- all trees will be added dynamically -->
                </div>    
            </div>
            <!-- Open the modal using ID.showModal() method -->
            <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
            <dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
                <!-- modal details dynamically added -->
            </dialog>     
            
            
            <div id="cart-section" class="border-2 border-amber-400  col-span-3 p-4 space-y-4">
                <h2 class="text-xl font-semibold">Your Cart</h2>
                <div id="card-container" class="space-y-4">
                    <div class="card bg-base-100 p-1 rounded-md space-y-3">
                        <div class="flex justify-between items-center ">
                            <div class="">
                                <h2 class="text-xl font-medium">Mango Tree</h2>
                                <p>$500 X <span id="quantity">1</span></p>
                            </div>
                            <button class="btn">X</button>
                        </div>
                        <p class="text-right text-lg text-green-500 font-bold">$10000</p>
                    </div>
                    
                </div>
                <div class="flex justify-between">
                    <span class="text-lg font-medium">Total:</span>
                    <span class="text-lg font-medium" id="total">0</span>
                </div>
            </div>
        </section>
    </main>
    <!-- JS -->
    <script src="./script.js"></script>

</body>

</html>
