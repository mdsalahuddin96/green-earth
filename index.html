<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!-- Font awesome integration -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Tailwind and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css">

</head>

<body class="bg-[#DCFCE7]">
    <main class="border-2 border-amber-500">
        <h1 class="text-2xl font-bold text-center">Choose Your Trees</h1>
        <section id="container" class="border-2 border-green-600 max-w-11/12 mx-auto my-10 grid grid-cols-12">
            <div id="category-section" class="p-4 col-span-3">
                <h2 class="text-xl font-semibold">Categories</h2>
                <div id="category-btn-section" class="flex flex-col gap-2 mt-4">
                    <button id="all-trees-btn" class="category-btn btn btn-outline active">All Trees</button>
                </div>
            </div>
            <div id="all-plant-section" class="p-4 col-span-6">
                <!-- all trees will be added dynamically -->
                <div id="trees-card-container" class="grid grid-cols-3 gap-3">
                    <div class="card bg-base-100  shadow-sm p-4 space-y-3 ">
                        <figure class="rounded-md">
                            <img
                            src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
                            alt="Shoes" />
                        </figure>
                        <div>
                            <h2 class="card-title">Card Title</h2>
                            <p>A card component has a figure, a body part, and inside body there are title and actions parts</p>
                        </div>
                        <div class="flex justify-between">
                            <div class="badge badge-outline badge-success">Success</div>
                            <span>$350</span>
                        </div>
                        <div class="card-actions ">
                            <button class="btn btn-primary w-full">Buy Now</button>
                        </div>  
                    </div>
                </div>
                
                
            </div>
            <div id="cart-section" class="border-2 border-amber-400 h-3.5 col-span-3"></div>
        </section>
    </main>
    <!-- JS -->
    <script src="./script.js"></script>

</body>

</html>
